<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>XAUAIBOT Pro</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;XAUAIBOT Pro&quot;,&quot;short_name&quot;:&quot;XAUAIBOT&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230a0c0f&quot;,&quot;theme_color&quot;:&quot;%23f5c842&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;https://via.placeholder.com/192x192/f5c842/000000?text=XAU&quot;,&quot;sizes&quot;:&quot;192x192&quot;}]}">
<meta name="theme-color" content="#f5c842">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="XAUAIBOT">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0a0c0f; --surface:#111418; --surface2:#181d23; --border:#1e2530;
    --gold:#f5c842; --gold-dim:#a88b1e; --buy:#22c55e; --sell:#ef4444;
    --neutral:#94a3b8; --text:#e2e8f0; --text-dim:#64748b; --accent:#3b82f6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;padding-bottom:80px;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{display:flex;align-items:center;gap:8px;}
  .logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),#c9940a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .logo-text{font-size:15px;font-weight:700;letter-spacing:.5px;}
  .logo-text span{color:var(--gold);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .live-badge{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .live-dot{width:7px;height:7px;background:var(--buy);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .notif-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 8px;border-radius:6px;font-size:12px;cursor:pointer;}
  .notif-btn.active{border-color:var(--gold);color:var(--gold);}

  .price-hero{background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);padding:20px 16px 16px;border-bottom:1px solid var(--border);}
  .price-main{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
  .price-value{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:600;color:var(--gold);letter-spacing:-1px;}
  .price-change{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:3px 8px;border-radius:4px;}
  .price-change.up{background:rgba(34,197,94,.15);color:var(--buy);}
  .price-change.down{background:rgba(239,68,68,.15);color:var(--sell);}
  .price-meta{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}

  /* SIGNAL */
  .signal-banner{margin:14px 16px;padding:14px 16px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;transition:all .3s;}
  .signal-banner.BUY{border-color:var(--buy);background:rgba(34,197,94,.07);}
  .signal-banner.SELL{border-color:var(--sell);background:rgba(239,68,68,.07);}
  .signal-banner.WAIT{border-color:var(--gold-dim);background:rgba(245,200,66,.05);}
  .signal-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
  .signal-value{font-size:22px;font-weight:700;letter-spacing:2px;}
  .signal-value.BUY{color:var(--buy);}
  .signal-value.SELL{color:var(--sell);}
  .signal-value.WAIT{color:var(--gold);}
  .signal-conf{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .signal-levels{text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;}
  .level-row{display:flex;gap:6px;justify-content:flex-end;margin-bottom:3px;}
  .level-tag{color:var(--text-dim);}
  .level-tp{color:var(--buy);}
  .level-sl{color:var(--sell);}

  /* M5 ENTRY BOX */
  .entry-box{margin:0 16px 14px;padding:14px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border);}
  .entry-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:10px;font-weight:600;}
  .entry-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .entry-item{text-align:center;}
  .entry-item-label{font-size:9px;color:var(--text-dim);margin-bottom:3px;text-transform:uppercase;}
  .entry-item-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;}
  .entry-filter{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
  .filter-tag{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;}
  .filter-ok{background:rgba(34,197,94,.15);color:var(--buy);}
  .filter-no{background:rgba(239,68,68,.15);color:var(--sell);}
  .filter-wait{background:rgba(148,163,184,.1);color:var(--neutral);}

  /* RISK CALC ROW (NEW) */
  .risk-row{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .risk-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;}
  .risk-row input:focus{border-color:var(--gold-dim);}
  .risk-result{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);white-space:nowrap;font-weight:600;}
  .risk-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;white-space:nowrap;}

  /* TABS NAV */
  .tab-nav{display:flex;gap:0;margin:0 16px 14px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .tab-btn{flex:1;padding:9px 4px;background:var(--surface2);border:none;color:var(--text-dim);font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.3px;}
  .tab-btn.active{background:var(--gold);color:#0a0c0f;}
  .tab-content{display:none;}
  .tab-content.active{display:block;}

  .main{padding:0 16px;}

  /* CHART */
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:600;}
  .tf-tabs{display:flex;gap:4px;}
  .tf-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 7px;border-radius:5px;cursor:pointer;transition:all .2s;}
  .tf-btn.active{background:var(--gold);color:#0a0c0f;border-color:var(--gold);font-weight:700;}
  canvas{max-height:160px;}

  /* INDICATORS */
  .indicators-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .indicator-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 12px;}
  .ind-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
  .ind-value{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:600;margin-bottom:3px;}
  .ind-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px;}
  .ind-bar-fill{height:100%;border-radius:2px;transition:width .5s;}
  .ind-status{font-size:10px;font-weight:600;letter-spacing:.5px;}

  /* MTF TABLE */
  .mtf-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .mtf-table{width:100%;border-collapse:collapse;font-size:11px;}
  .mtf-table th{text-align:left;padding:5px 8px;color:var(--text-dim);font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;border-bottom:1px solid var(--border);}
  .mtf-table td{padding:7px 8px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid rgba(30,37,48,.5);}
  .mtf-table tr:last-child td{border-bottom:none;}
  .mtf-table tr.highlight-m5{background:rgba(245,200,66,.05);}
  .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;}
  .badge-buy{background:rgba(34,197,94,.15);color:var(--buy);}
  .badge-sell{background:rgba(239,68,68,.15);color:var(--sell);}
  .badge-neu{background:rgba(148,163,184,.1);color:var(--neutral);}

  /* ECONOMIC CALENDAR (NEW) */
  .news-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .news-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
  .news-item:last-child{border-bottom:none;}
  .news-impact{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .news-impact.high{background:var(--sell);box-shadow:0 0 6px var(--sell);}
  .news-impact.medium{background:var(--gold);}
  .news-impact.low{background:var(--text-dim);}
  .news-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);width:46px;flex-shrink:0;}
  .news-info{flex:1;}
  .news-title{font-size:12px;font-weight:600;color:var(--text);}
  .news-sub{font-size:10px;color:var(--text-dim);margin-top:1px;}
  .news-soon{background:rgba(239,68,68,.1);border:1px solid var(--sell);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:11px;color:var(--sell);display:none;}

  /* AI PANEL */
  .ai-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .ai-icon{width:28px;height:28px;background:linear-gradient(135deg,#6366f1,#3b82f6);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .ai-title{font-size:13px;font-weight:600;}
  .ai-sub{font-size:10px;color:var(--text-dim);}
  #ai-output{font-size:13px;line-height:1.7;color:var(--text);min-height:80px;}
  #ai-output .placeholder{color:var(--text-dim);font-style:italic;}
  .ai-typing{display:flex;gap:4px;margin-top:8px;}
  .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce 1s infinite;}
  .dot:nth-child(2){animation-delay:.15s;}
  .dot:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  .btn-analyze{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#c9940a);color:#0a0c0f;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:.5px;transition:all .2s;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-analyze:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(245,200,66,.3);}
  .btn-analyze:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  /* AI ENGINE SELECTOR (NEW) */
  .engine-selector{display:flex;gap:8px;margin-bottom:10px;}
  .engine-opt{flex:1;padding:10px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:all .2s;}
  .engine-opt.active{border-color:var(--gold);background:rgba(245,200,66,.08);}
  .engine-opt-name{font-size:12px;font-weight:700;}
  .engine-opt-sub{font-size:9px;color:var(--text-dim);margin-top:2px;}
  .engine-opt.active .engine-opt-name{color:var(--gold);}

  /* SETTINGS TAB */
  .settings-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .settings-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);margin-bottom:8px;font-weight:600;}
  .apikey-row{display:flex;gap:8px;}
  .apikey-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;}
  .apikey-input:focus{border-color:var(--gold-dim);}
  .btn-save{background:var(--surface2);border:1px solid var(--gold-dim);color:var(--gold);font-size:12px;font-weight:600;padding:9px 14px;border-radius:7px;cursor:pointer;white-space:nowrap;}
  .groq-badge{display:inline-block;background:linear-gradient(135deg,#f55036,#ff6b35);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px;margin-left:4px;vertical-align:middle;}
  .claude-badge{display:inline-block;background:linear-gradient(135deg,#d97757,#c2410c);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px;margin-left:4px;vertical-align:middle;}

  /* NOTIF TOAST */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--gold);color:var(--text);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;}
  .nav-btn{flex:1;padding:10px 2px;background:none;border:none;color:var(--text-dim);font-size:9px;font-family:'Space Grotesk',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
  .nav-btn.active{color:var(--gold);}
  .nav-icon{font-size:16px;}

  .last-update{text-align:center;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:10px 0 4px;}
  .refresh-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;margin-top:6px;display:inline-block;}

  /* SIGNAL HISTORY / WIN RATE (UPGRADED) */
  .history-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .history-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
  .history-item:last-child{border-bottom:none;}
  .history-signal{font-size:12px;font-weight:700;}
  .history-price{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);}
  .history-time{font-size:10px;color:var(--text-dim);}
  .history-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:3px;display:inline-block;}
  .status-win{background:rgba(34,197,94,.15);color:var(--buy);}
  .status-loss{background:rgba(239,68,68,.15);color:var(--sell);}
  .status-open{background:rgba(245,200,66,.12);color:var(--gold);}

  .winrate-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
  .winrate-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;}
  .winrate-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--gold);}
  .winrate-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;margin-top:3px;letter-spacing:.5px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">XAU<span>AI</span>BOT <span style="font-size:10px;color:var(--text-dim);font-weight:400">Pro</span></div>
  </div>
  <div class="header-right">
    <button class="notif-btn" id="notif-btn" onclick="toggleNotif()">🔔 Notif</button>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="header-time">--:--:--</span>
    </div>
  </div>
</header>

<!-- PRICE -->
<div class="price-hero">
  <div class="price-main">
    <div class="price-value" id="price-display">$-.---</div>
    <div class="price-change" id="price-change">--</div>
  </div>
  <div class="price-meta" id="price-meta">XAU/USD · Memuat data...</div>
</div>

<!-- NEWS SOON WARNING (NEW) -->
<div class="main" style="padding-top:10px">
  <div class="news-soon" id="news-soon"></div>
</div>

<!-- SIGNAL BANNER -->
<div class="signal-banner WAIT" id="signal-banner">
  <div>
    <div class="signal-label">Sinyal AI</div>
    <div class="signal-value WAIT" id="signal-text">TUNGGU</div>
    <div class="signal-conf" id="signal-conf">Belum dianalisis</div>
  </div>
  <div class="signal-levels">
    <div class="level-row"><span class="level-tag">TP:</span><span class="level-tp" id="level-tp">-</span></div>
    <div class="level-row"><span class="level-tag">SL:</span><span class="level-sl" id="level-sl">-</span></div>
    <div class="level-row"><span class="level-tag">RR:</span><span style="color:var(--text-dim)" id="level-rr">-</span></div>
  </div>
</div>

<!-- M5 ENTRY BOX -->
<div class="entry-box" id="entry-box">
  <div class="entry-title">🎯 Entry M5 · Konfirmasi H1 + H4</div>
  <div class="entry-grid">
    <div class="entry-item">
      <div class="entry-item-label">Entry</div>
      <div class="entry-item-val" id="entry-price" style="color:var(--gold)">-</div>
    </div>
    <div class="entry-item">
      <div class="entry-item-label">Stop Loss</div>
      <div class="entry-item-val" id="entry-sl" style="color:var(--sell)">-</div>
    </div>
    <div class="entry-item">
      <div class="entry-item-label">Take Profit</div>
      <div class="entry-item-val" id="entry-tp" style="color:var(--buy)">-</div>
    </div>
  </div>
  <div class="entry-filter" id="entry-filter">
    <span class="filter-tag filter-wait">H1: menunggu</span>
    <span class="filter-tag filter-wait">H4: menunggu</span>
    <span class="filter-tag filter-wait">M5: menunggu</span>
  </div>
  <!-- RISK CALCULATOR (NEW) -->
  <div class="risk-row">
    <span class="risk-label">Saldo $</span>
    <input type="number" id="risk-balance" placeholder="1000" value="1000" oninput="calcLotSize()">
    <span class="risk-label">Risk %</span>
    <input type="number" id="risk-percent" placeholder="1" value="1" oninput="calcLotSize()" style="max-width:50px">
  </div>
  <div class="risk-row" style="border-top:none;padding-top:6px;justify-content:space-between">
    <span class="risk-label">→ Lot Size Disarankan</span>
    <span class="risk-result" id="risk-lot">- lot</span>
  </div>
</div>

<!-- TAB NAV -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('chart',this)">📈 Chart</button>
  <button class="tab-btn" onclick="switchTab('mtf',this)">🔍 MTF</button>
  <button class="tab-btn" onclick="switchTab('ai',this)">🤖 AI</button>
  <button class="tab-btn" onclick="switchTab('news',this)">📰 News</button>
  <button class="tab-btn" onclick="switchTab('history',this)">📋 Log</button>
</div>

<!-- TAB: CHART -->
<div class="tab-content active main" id="tab-chart">
  <div class="chart-card">
    <div class="card-header">
      <span class="card-title">Grafik Harga</span>
      <div class="tf-tabs">
        <button class="tf-btn active" onclick="switchTF('M5',event)">M5</button>
        <button class="tf-btn" onclick="switchTF('H1',event)">H1</button>
        <button class="tf-btn" onclick="switchTF('H4',event)">H4</button>
        <button class="tf-btn" onclick="switchTF('D1',event)">D1</button>
      </div>
    </div>
    <canvas id="priceChart"></canvas>
  </div>
  <div class="indicators-grid">
    <div class="indicator-card">
      <div class="ind-label">RSI (14)</div>
      <div class="ind-value" id="rsi-val" style="color:var(--gold)">--</div>
      <div class="ind-status" id="rsi-status" style="color:var(--text-dim)">Menunggu</div>
      <div class="
